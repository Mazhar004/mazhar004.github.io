<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mazhar Hossain - CV</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Georgia", "Times New Roman", serif;
        color: #1a1a1a;
        background: #f5f5f5;
        line-height: 1.35;
        font-size: 9.5pt;
      }

      .cv {
        max-width: 8.5in;
        margin: 1rem auto;
        background: #fff;
        padding: 0.35in 0.5in;
        box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      }

      .cv-header { text-align: center; margin-bottom: 0.08in; border-bottom: 2px solid #1a1a1a; padding-bottom: 0.06in; }
      .cv-header h1 { font-size: 16pt; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2pt; }
      .cv-header .subtitle { font-size: 9.5pt; color: #444; font-style: italic; margin-bottom: 4pt; }
      .cv-meta { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.12in; font-size: 8.5pt; color: #333; }
      .cv-meta a { color: #333; text-decoration: none; display: inline-flex; align-items: center; gap: 3pt; }
      .cv-meta a svg { width: 11pt; height: 11pt; flex-shrink: 0; }

      .cv-section { margin-bottom: 0.05in; }
      .cv-section-title {
        font-size: 9.5pt;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid #999;
        padding-bottom: 1pt;
        margin-bottom: 0.04in;
      }

      .cv-entry { margin-bottom: 0.04in; }
      .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
      .cv-entry-title { font-weight: bold; font-size: 9pt; }
      .cv-entry-date { font-size: 8.5pt; color: #555; white-space: nowrap; }
      .cv-entry-org { font-style: italic; color: #333; font-size: 8.5pt; }
      .cv-entry-loc { font-size: 8.5pt; color: #555; }
      .cv-entry-sub { display: flex; justify-content: space-between; align-items: baseline; }
      .cv-entry ul { padding-left: 0.18in; margin-top: 1pt; }
      .cv-entry li { font-size: 8.5pt; margin-bottom: 0; line-height: 1.3; }

      .cv-skills-line { font-size: 8.5pt; margin-bottom: 1pt; }
      .cv-skills-line strong { font-size: 8.5pt; }

      .cv-edu-entry { margin-bottom: 0.03in; }

      .cv-certs { list-style: disc; padding-left: 0.18in; font-size: 8.5pt; columns: 2; column-gap: 0.3in; }
      .cv-certs li { margin-bottom: 0; break-inside: avoid; }

      .cv-projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.04in 0.2in; }
      .cv-projects-grid .cv-entry { margin-bottom: 0.02in; break-inside: avoid; }
      .cv-proj-desc { font-size: 8pt; color: #333; }

      .cv-summary { font-size: 8.5pt; }

      .cv-entry-title a, .cv-certs a { color: #1a1a1a; text-decoration: underline; text-underline-offset: 1pt; }

      .cv-actions {
        max-width: 8.5in;
        margin: 0 auto 0.5rem;
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
      }
      .cv-actions button {
        padding: 0.4rem 1rem;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 6px;
        font-size: 9pt;
        cursor: pointer;
        font-family: -apple-system, system-ui, sans-serif;
      }
      .cv-actions button:hover { background: #f0f0f0; }
      .cv-actions button.primary { background: #1e40af; color: #fff; border-color: #1e40af; }
      .cv-actions button.primary:hover { background: #1e3a8a; }

      .cv-loading { text-align: center; padding: 2in 0; font-size: 11pt; color: #888; font-family: sans-serif; }

      @media print {
        body { background: none; }
        .cv { box-shadow: none; margin: 0; padding: 0.15in 0.35in; max-width: none; }
        .cv-actions { display: none; }
        a { color: inherit; text-decoration: none; }
        .cv-meta a svg { width: 10pt; height: 10pt; }
        .cv-entry, .cv-edu-entry, .cv-section { page-break-inside: avoid; break-inside: avoid; }
        @page { margin: 0.15in; size: letter; }
      }
    </style>
  </head>
  <body>
    <div class="cv-actions">
      <button class="primary" onclick="window.print()">Print / Save as PDF</button>
      <button onclick="window.close() || history.back()">Close</button>
    </div>
    <div class="cv" id="cv">
      <p class="cv-loading">Loading CV...</p>
    </div>

    <script>
      // ============================================================
      // CV data — embedded inline so cv.html works on file:// AND http://
      // Keep these in sync with index.html when content changes.
      // ============================================================

      const HEADER = {
        name: "Mazhar Hossain",
        location: "Milwaukee, WI",
        email: "princemazhar.mp@gmail.com",
        links: {
          linkedin: "https://www.linkedin.com/in/mazhar004/",
          github: "https://github.com/mazhar004",
          scholar: "https://scholar.google.com/citations?user=k7h0b8gAAAAJ",
          stackoverflow: "https://stackoverflow.com/users/11755018/mazhar"
        }
      };

      const SUMMARY = "Python backend and data engineer with 6+ years of experience across data pipelines, ML systems & production APIs. Focused on data quality, observability & scalable ingestion frameworks. Research Assistant at Marquette University (mHealth), currently developing ML-enabled mHealth data collection platforms.";

      const SKILLS = {
        technical: [
          { label: 'Languages', items: 'Python, SQL' },
          { label: 'Frameworks', items: 'Django, Flask, RASA' },
          { label: 'Data', items: 'PostgreSQL, ETL, Airflow, Web Scraping, Selenium, Scrapy' },
          { label: 'ML / AI', items: 'PyTorch, Scikit-learn, OpenCV, TensorFlow' },
          { label: 'DevOps', items: 'Docker, GitHub Actions, Prometheus, Grafana' }
        ],
        soft: [
          'Data Quality & Observability',
          'Cross-team Collaboration',
          'Technical Documentation',
          'Problem Solving',
          'Mentoring'
        ]
      };

      const EXPERIENCE = [
        {
          company: "Marquette University",
          role: "Research Assistant",
          meta: "Jan 2026 — Present · Milwaukee, WI",
          bullets: [
            "Research on mHealth applications and applied ML.",
            "Designing & developing a suicide prevention survey system for early risk detection & behavioral assessment.",
            "Building multimodal patient monitoring frameworks for mental & physiological health tracking.",
            "Researching neuro-signal correlations with physical health indicators.",
            "Designing computer vision methods for contactless health monitoring via face and fingertip video signals.",
            "Extracting remote biomarkers including immunization & white blood cell (WBC) indicators."
          ]
        },
        {
          company: "Cefalo",
          role: "Software Engineer → Senior",
          meta: "Sep 2021 — Dec 2025 · Dhaka, BD",
          bullets: [
            "Built energy market forecasting data products and RESTful backends.",
            "Built RESTful services for urgent market data ingestion.",
            "Managed pipelines from 500+ sources with high integrity and availability.",
            "Automated verification processes, reducing debugging time by 95%.",
            "Redesigned ingestion framework, cutting new-source effort by 60%.",
            "Implemented monitoring for critical sources, reducing response time by 35%.",
            "Contributed to data platform reliability and automation."
          ]
        },
        {
          company: "Upwork",
          role: "Python Developer (Freelance)",
          meta: "Feb 2021 — Dec 2022 · Remote",
          bullets: [
            "Delivered ETL pipelines across diverse data sources.",
            "Stabilized systems by fixing and optimizing existing scripts.",
            "Produced clear documentation for workflows and installations.",
            "Maintained 100% job success rate."
          ]
        },
        {
          company: "BJIT",
          role: "AI Engineer",
          meta: "Oct 2019 — Aug 2021 · Dhaka, BD",
          bullets: [
            "Improved dataset quality by 30% through augmentation and labeling.",
            "Delivered drone small-object detection with 74% accuracy.",
            "Improved chatbot response accuracy by 43% with model training and API integration.",
            "Built recommender system using collaborative and content-based filtering."
          ]
        }
      ];

      const EDUCATION = [
        { school: "Marquette University", degree: "Master's in Data Science · 2026 — 2027", note: "Research Assistant (mHealth)", badge: "M.Sc." },
        { school: "Khulna University of Engineering & Technology", degree: "B.Sc. in ECE · 2014 — 2018", note: "Electronics & Communication Engineering", badge: "B.Sc." }
      ];

      const PROJECTS = [
        { title: "Chatbot Platform", desc: "Intent- and entity-based chatbot system with dataset tooling, multi-profile support & Flask APIs.", tags: ["RASA", "Flask", "NLP", "CUDA"], link: "" },
        { title: "Small Object Detection", desc: "Trained YOLOv3 and Faster R-CNN pipelines for drones, birds, and underwater fish with performance reporting.", tags: ["PyTorch", "OpenCV", "TensorBoard"], link: "https://github.com/Mazhar004/object-detection-api" },
        { title: "Django Web App", desc: "Web app for server lookup by IP and content recommendations.", tags: ["Django", "HTML/CSS", "REST"], link: "https://prince004.pythonanywhere.com/weblocate" }
      ];

      const CERTIFICATIONS = [
        { name: "OWASP Top 10:2021 in Python", link: "https://www.secureflag.com/s?f1a679f6-27b1-488a-9493-7cba93e24130" },
        { name: "SQL for Data Science", link: "https://www.coursera.org/account/accomplishments/verify/9ZGFH9U5RJQM" },
        { name: "Python Specialization", link: "https://www.coursera.org/account/accomplishments/specialization/TN69JGDPTX3Y" },
        { name: "Deep Learning Specialization", link: "https://www.coursera.org/account/accomplishments/specialization/FRL8YY38G773" },
        { name: "Machine Learning", link: "https://www.coursera.org/account/accomplishments/verify/MENNNZ7DR22Z" }
      ];

      // Companies to skip from experience (e.g., short freelance gigs)
      const SKIP_COMPANIES = ['upwork'];

      // SVG icons for header contact links
      const ICONS = {
        linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
        github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>',
        scholar: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>',
        stackoverflow: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.725 0l-1.72 1.277 6.39 8.588 1.716-1.277L15.725 0zm-3.94 3.418l-1.369 1.644 8.225 6.85 1.369-1.644-8.225-6.85zm-3.15 4.465l-.905 1.94 9.702 4.517.904-1.94-9.701-4.517zm-1.85 4.86l-.44 2.093 10.473 2.201.44-2.092-10.473-2.203zM1.89 15.47V24h19.19v-8.53h-2.133v6.397H4.021v-6.396H1.89zm4.265 2.133v2.13h10.66v-2.13H6.154z"/></svg>'
      };

      function buildCV() {
        const expEntries = EXPERIENCE.filter(e => !SKIP_COMPANIES.includes(e.company.toLowerCase()));

        const expHTML = expEntries.map(e => {
          const parts = e.meta.split('·').map(s => s.trim());
          const date = parts[0] || '';
          const loc = parts[1] || '';
          return `
            <div class="cv-entry">
              <div class="cv-entry-header">
                <span class="cv-entry-title">${e.role}</span>
                <span class="cv-entry-date">${date}</span>
              </div>
              <div class="cv-entry-sub">
                <span class="cv-entry-org">${e.company}</span>
                <span class="cv-entry-loc">${loc}</span>
              </div>
              <ul>${e.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
            </div>
          `;
        }).join('');

        const eduHTML = EDUCATION.map(e => {
          const parts = e.degree.split('·').map(s => s.trim());
          const field = parts[0] || '';
          const years = parts[1] || '';
          return `
            <div class="cv-edu-entry">
              <div class="cv-entry-header">
                <span class="cv-entry-title">${field}${e.note ? ' — ' + e.note : ''}</span>
                <span class="cv-entry-date">${years}</span>
              </div>
              <div class="cv-entry-sub">
                <span class="cv-entry-org">${e.school}</span>
              </div>
            </div>
          `;
        }).join('');

        const projHTML = PROJECTS.map(p => `
          <div class="cv-entry">
            <span class="cv-entry-title">${p.link ? `<a href="${p.link}">${p.title}</a>` : p.title}</span>
            <span class="cv-proj-desc"> — ${p.desc}${p.tags.length ? ` <em>(${p.tags.join(', ')})</em>` : ''}</span>
          </div>
        `).join('');

        const certsHTML = CERTIFICATIONS.map(c => `<li>${c.link ? `<a href="${c.link}">${c.name}</a>` : c.name}</li>`).join('');

        const skillsHTML = SKILLS.technical.map(s => `<p class="cv-skills-line"><strong>${s.label}:</strong> ${s.items}</p>`).join('');

        document.getElementById('cv').innerHTML = `
          <header class="cv-header">
            <h1>${HEADER.name}</h1>
            <div class="cv-meta">
              <span>${HEADER.location}</span>
              <span>|</span>
              <a href="mailto:${HEADER.email}">${HEADER.email}</a>
              <span>|</span>
              <a href="${HEADER.links.linkedin}" title="LinkedIn">${ICONS.linkedin} LinkedIn</a>
              <span>|</span>
              <a href="${HEADER.links.github}" title="GitHub">${ICONS.github} GitHub</a>
              <span>|</span>
              <a href="${HEADER.links.scholar}" title="Google Scholar">${ICONS.scholar} Scholar</a>
              <span>|</span>
              <a href="${HEADER.links.stackoverflow}" title="Stack Overflow">${ICONS.stackoverflow} SO</a>
            </div>
          </header>

          <section class="cv-section">
            <h2 class="cv-section-title">Summary</h2>
            <p class="cv-summary">${SUMMARY}</p>
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Experience</h2>
            ${expHTML}
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Education</h2>
            ${eduHTML}
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Technical Skills</h2>
            ${skillsHTML}
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Soft Skills</h2>
            <p class="cv-skills-line">${SKILLS.soft.join(' · ')}</p>
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Projects</h2>
            <div class="cv-projects-grid">${projHTML}</div>
          </section>

          <section class="cv-section">
            <h2 class="cv-section-title">Certifications</h2>
            <ul class="cv-certs">${certsHTML}</ul>
          </section>
        `;
      }

      // Render synchronously — no fetch, no async — works on file:// and http://
      try {
        buildCV();
        // Notify parent (when used as iframe) that content is ready
        if (window.parent && window.parent !== window) {
          window.parent.postMessage('cv-ready', '*');
        }
        // Auto-print when opened with ?print=1
        if (new URLSearchParams(window.location.search).get('print') === '1') {
          // Brief delay so fonts settle before the print dialog
          setTimeout(() => { window.print(); }, 350);
        }
      } catch (err) {
        document.getElementById('cv').innerHTML = '<p class="cv-loading">Failed to render CV: ' + (err && err.message ? err.message : 'unknown error') + '</p>';
        console.error(err);
      }
    </script>
  </body>
</html>
