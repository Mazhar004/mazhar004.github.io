<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#131822"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#ff7a5c" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ff7a5c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff7a5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#ff7a5c" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Eyebrow label -->
  <text x="80" y="155" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="20" fill="#ff7a5c" letter-spacing="4">PORTFOLIO · 2026</text>

  <!-- Name -->
  <text x="80" y="290" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="108" font-weight="700" fill="#f4efe4" letter-spacing="-3">Mazhar</text>
  <text x="80" y="405" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="108" font-weight="600" font-style="italic" fill="#ff7a5c" letter-spacing="-2">Hossain.</text>

  <!-- Role -->
  <text x="80" y="470" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="28" fill="#e3dcc9" font-weight="500">Data Engineer · Python · ML Systems</text>

  <!-- Bottom meta -->
  <text x="80" y="575" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#7c736a" letter-spacing="2">mazhar004.github.io</text>

  <!-- Corner mark -->
  <g transform="translate(1040, 525)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#ff7a5c"/>
